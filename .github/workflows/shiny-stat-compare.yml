name: Generate stat comparison video

on:
  workflow_dispatch: {}
  # Cron-Trigger vorübergehend deaktiviert: das stat_compare-Rundenformat
  # ist noch nicht fertig. Der Abend-Slot (0 20 * * *) läuft solange
  # stattdessen über shiny-species-cry.yml. Weiterhin manuell über
  # "Run workflow" (workflow_dispatch) testbar. Sobald fertig, einfach den
  # untenstehenden schedule-Block wieder einkommentieren und den zweiten
  # cron-Eintrag in shiny-species-cry.yml entfernen.
  # schedule:
  #   - cron: "0 20 * * *"

jobs:
  generate-video:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formats/shiny-quiz

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (ffmpeg, ImageMagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Relax ImageMagick security policy for MoviePy TextClip
        run: |
          # Die Policy blockiert Pfade mit '@*' – das nutzt MoviePy für TextClip.
          # Wir erlauben read|write für dieses Pattern.
          if [ -f /etc/ImageMagick-6/policy.xml ]; then
            sudo sed -i 's#<policy domain="path" rights="none" pattern="@\*"/>#<policy domain="path" rights="read|write" pattern="@*"/>#' /etc/ImageMagick-6/policy.xml
          elif [ -f /etc/ImageMagick/policy.xml ]; then
            sudo sed -i 's#<policy domain="path" rights="none" pattern="@\*"/>#<policy domain="path" rights="read|write" pattern="@*"/>#' /etc/ImageMagick/policy.xml
          fi

      - name: Install Python dependencies (Pillow <10, MoviePy 1.0.3, Requests, tqdm)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pillow<10"
          python -m pip install "moviepy==1.0.3"
          python -m pip install requests tqdm
          python -m pip install google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Download assets from latest release
        run: |
          # assets.tar.gz sollte beim Entpacken direkt den Ordner assets/
          # (mit den Unterordnern pokemon/, fonts/, audio/, backgrounds/)
          # ergeben, z.B. gepackt mit: tar czf assets.tar.gz assets
          curl -L "https://github.com/${{ github.repository }}/releases/latest/download/assets.tar.gz" -o assets.tar.gz
          tar xzf assets.tar.gz

      - name: Generate video
        run: |
          python quiz_video.py --output output.mp4 --round-type stat_compare

      - name: Upload video as artifact (zum Testen)
        uses: actions/upload-artifact@v4
        with:
          name: stat-compare-video
          path: formats/shiny-quiz/output.mp4

      - name: Upload to YouTube Shorts
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_STAT_PLAYLIST_ID: ${{ secrets.YT_STAT_PLAYLIST_ID }}
        run: python upload_youtube.py --video output.mp4 --format stat
