<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok OAuth Callback - Guess the Pokémon</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; line-height: 1.6; color: #1a1a1a; }
  code { background: #f2f2f2; padding: 2px 6px; border-radius: 4px; word-break: break-all; }
  .box { background: #f8f8f8; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-top: 20px; }
</style>
</head>
<body>
<h1>Authorization complete</h1>
<p>
  This page is only used once, to manually retrieve the one-time
  authorization code from TikTok's redirect after granting access.
  Copy the value below into the local refresh-token setup script.
</p>
<div class="box">
  <strong>code:</strong> <code id="code">(none found in URL)</code><br><br>
  <strong>state:</strong> <code id="state">(none found in URL)</code>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  document.getElementById("code").textContent = params.get("code") || "(none found in URL)";
  document.getElementById("state").textContent = params.get("state") || "(none found in URL)";
</script>
</body>
</html>
